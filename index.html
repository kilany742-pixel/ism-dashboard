<!DOCTYPE html>

<head>

<!-- ============================================================
     🔥 FIREBASE SETUP
     ============================================================
     خطوات الإعداد (مرة واحدة بس):
     1. روح على https://console.firebase.google.com
     2. اعمل مشروع جديد (مجاناً)
     3. من القائمة الجانبية: Firestore Database → Create database → Start in test mode
     4. روح على Project Settings (⚙️) → General → Your apps → Add app (Web)
     5. انسخ الـ firebaseConfig وحطها بدل الموجودة تحت
     ============================================================ -->

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDocs, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ⬇️ ضع هنا الـ config بتاعك من Firebase Console
  const firebaseConfig = {
    apiKey: "AIzaSyAb_YOdtAHQVALQJnLPivxpP6SzCD7u08c",
    authDomain: "ismalia-zahran.firebaseapp.com",
    projectId: "ismalia-zahran",
    storageBucket: "ismalia-zahran.firebasestorage.app",
    messagingSenderId: "287855781836",
    appId: "1:287855781836:web:f22849ead18f54e4891f69"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ===================== حفظ عملية في Firebase =====================
  window.saveAction = async function(entry) {
    try {
      await setDoc(doc(db, "actions", entry.code), {
        type:      entry.type,
        code:      entry.code,
        name:      entry.name,
        area:      entry.area      || '',
        oldCode:   entry.oldCode   || '',
        legalName: entry.legalName || '',
        address:   entry.address   || '',
        fridges:   entry.fridges   || '',
        details:   entry.details   || '',
        time:      entry.time,
        timeDisplay: entry.timeDisplay
      });
      return true;
    } catch (e) {
      console.error("Firebase save error:", e);
      showToast("⚠️ خطأ في الحفظ الأونلاين — محفوظ محلياً مؤقتاً");
      return false;
    }
  };

  window.deleteAction = async function(code) {
    try {
      const { deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      await deleteDoc(doc(db, "actions", code));
      return true;
    } catch (e) {
      console.error("Firebase delete error:", e);
      return false;
    }
  };

  // ===================== تحميل كل البيانات من Firebase =====================
  // ===================== تكملة البيانات الناقصة من قاعدة العملاء =====================
  function enrichEntry(entry) {
    const client = CLIENTS.find(c => c.newCode === entry.code);
    if (!client) return entry;
    return {
      ...entry,
      oldCode:   entry.oldCode   || client.oldCode   || '',
      legalName: entry.legalName || client.legalName || '',
      address:   entry.address   || client.address   || '',
      fridges:   entry.fridges   || client.fridges   || '',
      area:      entry.area      || client.area       || '',
      name:      entry.name      || client.name       || '',
    };
  }

  window.loadFromFirebase = async function() {
    try {
      showSyncIndicator("جاري تحميل البيانات...", "loading");
      const snapshot = await getDocs(collection(db, "actions"));
      actionLog = [];
      snapshot.forEach(docSnap => {
        actionLog.push(enrichEntry(docSnap.data()));
      });
      // ترتيب من الأحدث للأقدم
      actionLog.sort((a, b) => new Date(b.time) - new Date(a.time));
      updateStats();
      renderAllList();
      renderSearch(document.getElementById('searchInput').value);
      showSyncIndicator("✅ متزامن", "ok");
      setTimeout(() => hideSyncIndicator(), 2500);
    } catch (e) {
      console.error("Firebase load error:", e);
      // Fallback: تحميل من localStorage
      loadFromLocalStorage();
      showSyncIndicator("⚠️ وضع offline — بيانات محلية", "warn");
    }
  };

  // ===================== Realtime listener — بيتحدث تلقائياً =====================
  window.startRealtimeSync = function() {
    onSnapshot(collection(db, "actions"), (snapshot) => {
      actionLog = [];
      snapshot.forEach(docSnap => {
        actionLog.push(enrichEntry(docSnap.data()));
      });
      actionLog.sort((a, b) => new Date(b.time) - new Date(a.time));
      updateStats();
      renderAllList();
      // لو في search نشط، حدثه
      const q = document.getElementById('searchInput').value;
      if (q) renderSearch(q);
      if (currentTab === 'log') renderLog();
      if (currentTab === 'stats') renderStats();
    }, (error) => {
      console.error("Realtime sync error:", error);
    });
  };

  // ابدأ بعد ما الصفحة تتحمل
  window.addEventListener('DOMContentLoaded', () => {
    window.loadFromFirebase().then(() => {
      window.startRealtimeSync();
    });
  });
</script>

<main class="main"><div class="tabs">
    <button class="tab active" onclick="switchTab('search')">🔍 بحث</button>
    <button class="tab" onclick="switchTab('log')">📋 السجل</button>
    <button class="tab" onclick="switchTab('stats')">📊 إحصائيات</button>
  </div>

  <!-- SEARCH TAB -->
  <div id="tab-search">
    <div class="search-card">
      <div class="search-wrap">
        <span>🔎</span>
        <input type="search" id="searchInput" placeholder="ابحث بالكود الجديد أو القديم أو اسم العميل..." autocomplete="off" oninput="onSearch(this.value)" inputmode="search">

      </div>
    </div>
    <div class="result-zone" id="resultZone"></div>
    <div id="allSection">
      <div class="section-label">👥 جميع العملاء (<span id="allCount">483</span>)</div>
      <div id="allList"></div>
    </div>
  </div>

// ==================== STATE ====================
let actionLog = [];
let currentTab = 'search';

// Sync indicator helpers
function showSyncIndicator(msg, type) {
  const bar = document.getElementById('syncBar');
  bar.textContent = msg;
  bar.className = 'sync-bar ' + type;
}
function hideSyncIndicator() {
  document.getElementById('syncBar').style.display = 'none';
}

// Fallback: load from localStorage if Firebase fails
function loadFromLocalStorage() {
  try {
    const saved = localStorage.getItem('zahran_log');
    if (saved) actionLog = JSON.parse(saved);
  } catch(e) { actionLog = []; }
}

function saveToLocalStorage() {
  try { localStorage.setItem('zahran_log', JSON.stringify(actionLog)); } catch(e) {}
}

function getClientStatus(code) {
  const entries = actionLog.filter(e => e.code === code);
  if (!entries.length) return null;
  return entries[entries.length - 1].type;
}

// ==================== AREA HELPERS ====================
function areaClass(area) {
  if (area.includes('الأردنية') || area.includes('أردن')) return 'ordonia';
  if (area.includes('مدينة') || area.includes('مدينه')) return 'madina';
  return 'asher';
}
function areaLabel(area) {
  if (area.includes('الأردنية') || area.includes('أردن')) return {cls:'area-ordonia', txt:'الأردنية'};
  if (area.includes('مدينة') || area.includes('مدينه')) return {cls:'area-madina', txt:'مدينة العاشر'};
  return {cls:'area-asher', txt:'العاشر'};
}
function areaEmoji(area) {
  if (area.includes('الأردنية')) return '🟣';
  if (area.includes('مدينة') || area.includes('مدينه')) return '🟢';
  return '🔵';
}

// ==================== SEARCH ====================
function normalize(s) { return (s||'').toLowerCase().replace(/\s+/g,' ').trim(); }
function highlight(text, q) {
  if (!q) return text;
  const idx = normalize(text).indexOf(normalize(q));
  if (idx < 0) return text;
  return text.slice(0,idx)+'<mark>'+text.slice(idx,idx+q.length)+'</mark>'+text.slice(idx+q.length);
}
function searchClients(q) {
  if (!q) return CLIENTS;
  const nq = normalize(q);
  return CLIENTS.filter(c =>
    normalize(c.newCode).includes(nq) ||
    normalize(c.oldCode).includes(nq) ||
    normalize(c.name).includes(nq) ||
    normalize(c.legalName).includes(nq) ||
    normalize(c.fridges).includes(nq)
  );
}
function onSearch(val) {
  document.getElementById('clearBtn').classList.toggle('show', val.length > 0);
  renderSearch(val);
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('show');
  renderSearch('');
}
function renderSearch(q) {
  const results = searchClients(q);
  const zone = document.getElementById('resultZone');
  const allSection = document.getElementById('allSection');
  if (q) {
    allSection.style.display = 'none';
    if (!results.length) {
      zone.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#9ca3af"><div style="font-size:44px">🔍</div><h3 style="font-size:14px;font-weight:700;color:#6b7280;margin-top:10px">لا توجد نتائج</h3></div>';
    } else {
      zone.innerHTML = results.slice(0,10).map(c => buildClientCard(c, q)).join('');
    }
  } else {
    allSection.style.display = 'block';
    zone.innerHTML = '';
    renderAllList();
  }
}

// ==================== CARD BUILDER ====================
function buildClientCard(c, q='') {
  const status = getClientStatus(c.newCode);
  const al = areaLabel(c.area);
  const statusBar = status === 'renew'
    ? `<div class="status-bar renewed"><span>✅ تم تجديد العقد — محفوظ في Firebase 🔥</span></div>`
    : status === 'needs'
    ? `<div class="status-bar needs"><span>⚠️ يحتاج تحديث — محفوظ في Firebase 🔥</span></div>`
    : '';
  const renewDone = status === 'renew' ? 'done' : '';
  const updateDone = status === 'needs' ? 'done' : '';
  return `
  <div class="client-card">
    <div class="card-header">
      <div class="card-name"><span>${areaEmoji(c.area)}</span><span class="txt">${highlight(c.name,q)}</span></div>
      <div class="card-code">${highlight(c.newCode,q)}</div>
    </div>
    <div class="card-row"><div class="row-label">🏷️ الكود القديم</div><div class="row-val green">${highlight(c.oldCode,q)}</div></div>
    <div class="card-row"><div class="row-label">👤 الاسم القانوني</div><div class="row-val">${c.legalName}</div></div>
    <div class="card-row"><div class="row-label">📍 المنطقة</div><div class="row-val"><span class="area-badge ${al.cls}">${al.txt}</span></div></div>
    ${c.address ? `<div class="card-row"><div class="row-label">🏠 العنوان</div><div class="row-val">${c.address}</div></div>` : ''}
    ${c.fridges && c.fridges !== '—' ? `<div class="card-row"><div class="row-label">🧊 الثلاجات</div><div class="row-val green" style="font-size:11px">${highlight(c.fridges,q)}</div></div>` : ''}
    ${statusBar}
    <div class="card-actions">
      <button class="btn-renew ${renewDone}" onclick="handleRenewClick('${c.newCode}','${c.name.replace(/'/g,"\\'")}',this)">${renewDone ? '✅ تم تجديد العقد' : '✅ تجديد عقد'}</button>
      <button class="btn-update ${updateDone}" onclick="handleNeedsClick('${c.newCode}','${c.name.replace(/'/g,"\\'")}',this)">${updateDone ? '⚠️ تم التسجيل' : '⚠️ يحتاج تحديث'}</button>
    </div>
  </div>`;
}

// ==================== ALL LIST ====================
function renderAllList() {
  const list = document.getElementById('allList');
  document.getElementById('allCount').textContent = CLIENTS.length;
  list.innerHTML = CLIENTS.map((c, i) => {
    const status = getClientStatus(c.newCode);
    const cls = areaClass(c.area);
    const statusBadge = status === 'renew'
      ? '<span class="mini-status renewed">✅ تجديد</span>'
      : status === 'needs'
      ? '<span class="mini-status needs">⚠️ تحديث</span>'
      : '';
    return `
    <div class="mini-card ${cls}" style="animation-delay:${Math.min(i*0.02,0.5)}s" onclick="expandClient('${c.newCode}')">
      <div class="mini-avatar ${cls}">${areaEmoji(c.area)}</div>
      <div class="mini-info">
        <div class="mini-name">${c.name}</div>
        <div class="mini-codes"><span class="mini-code">${c.newCode}</span><span class="mini-code">${c.oldCode}</span></div>
      </div>
      ${statusBadge}
    </div>`;
  }).join('');
}
function expandClient(code) {
  const c = CLIENTS.find(x => x.newCode === code);
  if (!c) return;
  document.getElementById('searchInput').value = code;
  document.getElementById('clearBtn').classList.add('show');
  renderSearch(code);
  window.scrollTo({top:0,behavior:'smooth'});
}

// ==================== BUTTON HANDLERS ====================
async function handleRenewClick(code, name, btn) {
  if (btn.classList.contains('btn-saving')) return;
  if (btn.classList.contains('done')) {
    // already done — undo it
    if (!confirm('إلغاء تجديد عقد ' + name + '؟')) return;
    await undoAction(code);
    return;
  }
  await doAction('renew', code, name, btn, '');
}

function handleNeedsClick(code, name, btn) {
  if (btn.classList.contains('btn-saving')) return;
  if (btn.classList.contains('done')) {
    // already done — undo it
    if (!confirm('إلغاء تسجيل تحديث ' + name + '؟')) return;
    undoAction(code);
    return;
  }
  openNeedsModal(code, name, btn);
}

// ==================== MODAL (يحتاج تحديث) ====================
let modalCode = '', modalName = '', modalBtn = null;

function openNeedsModal(code, name, btn) {
  if (btn.classList.contains('done')) return;
  modalCode = code; modalName = name; modalBtn = btn;
  document.getElementById('modalClientName').textContent = name + ' — ' + code;
  // reset
  ['fridge','name','address','other'].forEach(k => {
    const chk = document.getElementById('chk-'+k);
    chk.checked = false;
    document.getElementById('inp-'+k).value = '';
    document.getElementById('extra-'+k).classList.remove('show');
    chk.closest('.modal-opt')?.classList.remove('selected');
  });
  document.getElementById('needsModal').classList.add('show');
}

function closeModal(e) {
  if (e.target.id === 'needsModal') document.getElementById('needsModal').classList.remove('show');
}

function toggleOpt(el, key) {
  // el is the .modal-opt div
  const div = el.classList.contains('modal-opt') ? el : el.closest('.modal-opt');
  if (!div) return;
  const chk = document.getElementById('chk-'+key);
  // toggle checkbox
  chk.checked = !chk.checked;
  document.getElementById('extra-'+key).classList.toggle('show', chk.checked);
  div.classList.toggle('selected', chk.checked);
}

async function confirmNeedsUpdate() {
  const details = [];
  if (document.getElementById('chk-fridge').checked) {
    const v = document.getElementById('inp-fridge').value.trim();
    details.push('🧊 ثلاجة: ' + (v || 'غير محدد'));
  }
  if (document.getElementById('chk-name').checked) {
    const v = document.getElementById('inp-name').value.trim();
    details.push('👤 اسم: ' + (v || 'غير محدد'));
  }
  if (document.getElementById('chk-address').checked) {
    const v = document.getElementById('inp-address').value.trim();
    details.push('📍 عنوان: ' + (v || 'غير محدد'));
  }
  if (document.getElementById('chk-other').checked) {
    const v = document.getElementById('inp-other').value.trim();
    details.push('📝 ' + (v || 'ملاحظة'));
  }
  document.getElementById('needsModal').classList.remove('show');
  await doAction('needs', modalCode, modalName, modalBtn, details.join(' | '));
}

// ==================== ACTIONS ====================
async function doAction(type, code, name, btn, details='') {
  if (btn.classList.contains('done') || btn.classList.contains('btn-saving')) return;

  btn.classList.add('btn-saving');
  btn.textContent = '⏳ جاري الحفظ...';

  const client = CLIENTS.find(c => c.newCode === code);
  const entry = {
    type,
    code,
    name,
    area:      client ? client.area      : '',
    oldCode:   client ? client.oldCode   : '',
    legalName: client ? client.legalName : '',
    address:   client ? client.address   : '',
    fridges:   client ? client.fridges   : '',
    details,
    time: new Date().toISOString(),
    timeDisplay: new Date().toLocaleString('ar-EG')
  };

  actionLog = actionLog.filter(e => e.code !== code);
  actionLog.unshift(entry);
  saveToLocalStorage();

  const saved = window.saveAction ? await window.saveAction(entry) : false;

  btn.classList.remove('btn-saving');
  btn.classList.add('done');
  const isRenew = type === 'renew';
  btn.textContent = isRenew ? '✅ تم تجديد العقد' : '⚠️ تم التسجيل';

  const actions = btn.parentElement;
  const other = isRenew ? actions.querySelector('.btn-update') : actions.querySelector('.btn-renew');
  if (other) { other.classList.remove('done'); other.textContent = isRenew ? '⚠️ يحتاج تحديث' : '✅ تجديد عقد'; }

  const card = btn.closest('.client-card');
  let bar = card.querySelector('.status-bar');
  const detailsHtml = details ? `<div style="font-size:10px;color:#92400e;margin-top:3px">${details}</div>` : '';
  const barHtml = isRenew
    ? `<div class="status-bar renewed"><span>✅ تم تجديد العقد — محفوظ في Firebase 🔥</span></div>`
    : `<div class="status-bar needs"><span>⚠️ يحتاج تحديث 🔥</span>${detailsHtml}</div>`;
  if (bar) bar.outerHTML = barHtml;
  else actions.insertAdjacentHTML('beforebegin', barHtml);

  updateStats();
  showToast(isRenew ? `✅ تجديد: ${name} 🔥` : `⚠️ تحديث: ${name} 🔥`);
  if (currentTab === 'log') renderLog();
}

// ==================== UNDO ====================
async function undoAction(code) {
  actionLog = actionLog.filter(e => e.code !== code);
  saveToLocalStorage();
  if (window.deleteAction) await window.deleteAction(code);
  updateStats();
  renderAllList();
  renderSearch(document.getElementById('searchInput').value);
  if (currentTab === 'log') renderLog();
  if (currentTab === 'stats') renderStats();
  showToast('🗑️ تم إلغاء العملية');
}

// ==================== LOG ====================
function renderLog() {
  const list = document.getElementById('logList');
  document.getElementById('logCount').textContent = actionLog.length;
  if (!actionLog.length) {
    list.innerHTML = `<div class="empty-log"><div class="em">📋</div><h3>لا توجد عمليات مسجلة بعد</h3></div>`;
    return;
  }
  list.innerHTML = actionLog.map(e => `
  <div class="log-item">
    <div class="log-icon ${e.type==='renew'?'renewed':'needs'}">${e.type==='renew'?'✅':'⚠️'}</div>
    <div class="log-info">
      <div class="log-name">${e.name}</div>
      <div class="log-meta" style="line-height:1.6">
        ${e.area ? '<span style="color:#1a6b3a;font-weight:700">📍 ' + e.area + '</span> · ' : ''}
        كود جديد: <strong>${e.code}</strong>
        ${e.oldCode ? ' · كود قديم: ' + e.oldCode : ''}
      </div>
      ${e.legalName ? `<div class="log-meta">👤 ${e.legalName}</div>` : ''}
      ${e.address ? `<div class="log-meta">🏠 ${e.address}</div>` : ''}
      ${e.fridges && e.fridges !== '—' ? `<div class="log-meta" style="color:#0369a1">🧊 ${e.fridges}</div>` : ''}
      ${e.details ? `<div class="log-details">📝 ${e.details}</div>` : ''}
      <button class="log-undo" onclick="undoAction('${e.code}')">🗑️ إلغاء</button>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <span class="log-type ${e.type==='renew'?'renewed':'needs'}">${e.type==='renew'?'تجديد عقد':'يحتاج تحديث'}</span>
      <span class="log-time">${e.timeDisplay}</span>
    </div>
  </div>`).join('');
}
function exportLog() {
  if (!actionLog.length) { showToast('⚠️ لا توجد بيانات للتصدير'); return; }
  const rows = [['النوع','كود جديد','كود قديم','اسم العميل','الاسم القانوني','المنطقة','العنوان','الثلاجات','التفاصيل','التاريخ والوقت']];
  actionLog.forEach(e => rows.push([e.type==='renew'?'تجديد عقد':'يحتاج تحديث', e.code, e.oldCode||'', e.name, e.legalName||'', e.area||'', e.address||'', e.fridges||'', e.details||'', e.timeDisplay]));
  const csv = '\uFEFF'+rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = 'سجل_زيارات_طارق_زهران.csv';
  a.click();
  showToast('✅ تم تصدير السجل');
}

// ==================== STATS ====================
function renderStats() {
  const renewed = actionLog.filter(e => e.type==='renew').length;
  const needs = actionLog.filter(e => e.type==='needs').length;
  const total = CLIENTS.length;
  const byArea = {};
  CLIENTS.forEach(c => {
    const k = areaLabel(c.area).txt;
    if (!byArea[k]) byArea[k]={total:0,renewed:0,needs:0};
    byArea[k].total++;
    const s = getClientStatus(c.newCode);
    if (s==='renew') byArea[k].renewed++;
    if (s==='needs') byArea[k].needs++;
  });
  document.getElementById('statsContent').innerHTML = `
  <div style="background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.08);margin-bottom:12px">
    <div style="font-size:13px;font-weight:700;color:#374151;margin-bottom:14px">📊 ملخص عام</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div style="background:#f0fdf4;border-radius:12px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:900;color:#059669">${renewed}</div><div style="font-size:10px;color:#6b7280;font-weight:600;margin-top:2px">تجديد عقد</div></div>
      <div style="background:#fefce8;border-radius:12px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:900;color:#d97706">${needs}</div><div style="font-size:10px;color:#6b7280;font-weight:600;margin-top:2px">يحتاج تحديث</div></div>
      <div style="background:#f3f4f6;border-radius:12px;padding:12px;text-align:center"><div style="font-size:22px;font-weight:900;color:#374151">${total-renewed-needs}</div><div style="font-size:10px;color:#6b7280;font-weight:600;margin-top:2px">لم يُزار</div></div>
    </div>
    <div style="margin-top:12px;background:#f3f4f6;border-radius:8px;height:10px;overflow:hidden">
      <div style="height:100%;width:${Math.round(((renewed+needs)/total)*100)}%;background:linear-gradient(90deg,#059669,#d97706);border-radius:8px"></div>
    </div>
    <div style="font-size:11px;color:#6b7280;text-align:center;margin-top:6px">${Math.round(((renewed+needs)/total)*100)}% تم زيارتهم</div>
  </div>
  ${Object.entries(byArea).map(([area,data])=>`
  <div style="background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,0.07);margin-bottom:8px">
    <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:10px">${areaEmoji(area==='الأردنية'?'الأردنية':area==='مدينة العاشر'?'مدينة':'')} ${area} — ${data.total} عميل</div>
    <div style="display:flex;gap:8px">
      <div style="flex:1;background:#f0fdf4;border-radius:8px;padding:8px;text-align:center"><div style="font-size:16px;font-weight:800;color:#059669">${data.renewed}</div><div style="font-size:9px;color:#6b7280">تجديد</div></div>
      <div style="flex:1;background:#fefce8;border-radius:8px;padding:8px;text-align:center"><div style="font-size:16px;font-weight:800;color:#d97706">${data.needs}</div><div style="font-size:9px;color:#6b7280">تحديث</div></div>
      <div style="flex:1;background:#f3f4f6;border-radius:8px;padding:8px;text-align:center"><div style="font-size:16px;font-weight:800;color:#374151">${data.total-data.renewed-data.needs}</div><div style="font-size:9px;color:#6b7280">لم يُزار</div></div>
    </div>
  </div>`).join('')}`;
}

// ==================== TABS ====================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['search','log','stats'][i]===tab));
  document.getElementById('tab-search').classList.toggle('hidden',tab!=='search');
  document.getElementById('tab-log').classList.toggle('hidden',tab!=='log');
  document.getElementById('tab-stats').classList.toggle('hidden',tab!=='stats');
  if (tab==='log') renderLog();
  if (tab==='stats') renderStats();
}
function updateStats() {
  document.getElementById('stat-renewed').textContent = actionLog.filter(e=>e.type==='renew').length;
  document.getElementById('stat-needs').textContent = actionLog.filter(e=>e.type==='needs').length;
}

// ==================== TOAST ====================
function showToast(msg) {
  const w = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  w.appendChild(t);
  setTimeout(()=>{if(t.parentNode)t.remove();},2700);
}

// ==================== INIT ====================
loadFromLocalStorage();
updateStats();
renderAllList();
</script>
</body>
</html>
